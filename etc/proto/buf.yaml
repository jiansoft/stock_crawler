version: v1
lint:
  use:
    - STANDARD
  except:
    # 套件名稱不使用 vX 版本後綴（例如 basic、stock、control）
    - PACKAGE_VERSION_SUFFIX
    # RPC 方法使用方法前綴命名 request（例如 DailyQuotesRequest 對應 StartDailyQuotes）
    - RPC_REQUEST_STANDARD_NAME
    # Response 型別使用 "Reply" 後綴而非 "Response"（例如 StockInfoReply）
    - RPC_RESPONSE_STANDARD_NAME
    # 多個 RPC 共用 BackfillJobResponse 作為通用 job 狀態回應
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
