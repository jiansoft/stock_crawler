syntax = "proto3";

package manual_backfill;

service ManualBackfill {
  rpc StartClosingAggregate(ClosingAggregateRequest) returns (BackfillJobResponse) {}
  rpc StartReceivedDividendRecords(SecurityCodeRequest) returns (BackfillJobResponse) {}
  rpc StartHistoricalDividends(SecurityCodeRequest) returns (BackfillJobResponse) {}
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {}
  rpc GetJob(GetJobRequest) returns (BackfillJobResponse) {}
}

message ClosingAggregateRequest {
  string date = 1;
}

message SecurityCodeRequest {
  string security_code = 1;
}

message ListJobsRequest {}

message GetJobRequest {
  string id = 1;
}

message BackfillJob {
  string id = 1;
  string kind = 2;
  string input = 3;
  string status = 4;
  string message = 5;
  string started_at = 6;
  string finished_at = 7;
}

message BackfillJobResponse {
  BackfillJob job = 1;
}

message ListJobsResponse {
  repeated BackfillJob jobs = 1;
}
