name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
    - uses: actions/checkout@v7
    - name: Dependency review
      uses: actions/dependency-review-action@v5
      with:
        # 只擋 high/critical 的 GHSA 漏洞；low/moderate 的逐級把關交給 cargo-deny
        # (RustSec) 那個 job。否則 GHSA 每日更新的 low-severity 公告(例如
        # rand 0.8.5 的 unsound 邊角案例)會在不相關的 PR 上反覆觸發失敗。
        fail-on-severity: high

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.95.0
        components: rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check

  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.95.0
        components: clippy
    - name: Rust cache
      uses: Swatinem/rust-cache@v2

    - name: Cargo check
      # --locked：要求 Cargo.lock 與 Cargo.toml 一致；若 lock 過期則明確報錯，
      # 而非默默重新解析相依（避免 transitive 套件浮到不相容新版本造成編譯失敗）。
      run: cargo check --locked --verbose
    - name: Clippy
      run: cargo clippy -- -D warnings

  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v7
    - uses: bufbuild/buf-action@v1
      with:
        input: etc/proto
        lint: true
        format: false
        breaking: false
        push: false

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: EmbarkStudios/cargo-deny-action@v2
      with:
        command: check advisories licenses bans

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, check, deny]
    steps:
    - uses: actions/checkout@v7
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.95.0
    - name: Rust cache
      uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build --verbose

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    steps:
    - uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.95.0
        components: rustfmt, clippy
    - name: Rust cache
      uses: Swatinem/rust-cache@v2
    - name: Install PostgresSQL client
      run: sudo apt-get -yqq install postgresql-client

    - name: Run SQL file
      run: |
        export PGPASSWORD=password
        psql -h localhost -U user -d db -a -f etc/sql/config.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_money_history.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_money_history_member.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_money_history_detail.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_money_history_detail_more.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_quote.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_stock_price_stats.sql
        psql -h localhost -U user -d db -a -f etc/sql/dividend.sql
        psql -h localhost -U user -d db -a -f etc/sql/dividend_record_detail.sql
        psql -h localhost -U user -d db -a -f etc/sql/dividend_record_detail_more.sql
        psql -h localhost -U user -d db -a -f etc/sql/estimate.sql
        psql -h localhost -U user -d db -a -f etc/sql/financial_statement.sql
        psql -h localhost -U user -d db -a -f etc/sql/index.sql
        psql -h localhost -U user -d db -a -f etc/sql/last_daily_quotes.sql
        psql -h localhost -U user -d db -a -f etc/sql/quote_history_record.sql
        psql -h localhost -U user -d db -a -f etc/sql/revenue.sql
        psql -h localhost -U user -d db -a -f etc/sql/revenue_last_date.sql
        psql -h localhost -U user -d db -a -f etc/sql/stock_exchange_market.sql
        psql -h localhost -U user -d db -a -f etc/sql/stock_industry.sql
        psql -h localhost -U user -d db -a -f etc/sql/stock_ownership_details.sql
        psql -h localhost -U user -d db -a -f etc/sql/stocks.sql
        psql -h localhost -U user -d db -a -f etc/sql/stock_word.sql
        psql -h localhost -U user -d db -a -f etc/sql/stock_index.sql
        psql -h localhost -U user -d db -a -f etc/sql/trace.sql
        psql -h localhost -U user -d db -a -f etc/sql/yield_rank.sql

    - name: Run tests
      run: cargo test --release -- --nocapture --test-threads=1
      env:
        RUST_BACKTRACE: 1
        DATABASE_URL: postgres://user:password@localhost:5432/db
        POSTGRESQL_HOST: localhost
        POSTGRESQL_PORT: 5432
        POSTGRESQL_USER: user
        POSTGRESQL_PASSWORD: password
        POSTGRESQL_DB: db

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    steps:
    - uses: actions/checkout@v7
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.95.0
        components: llvm-tools-preview
    - name: Rust cache
      uses: Swatinem/rust-cache@v2
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov
    - name: Install PostgreSQL client
      run: sudo apt-get -yqq install postgresql-client

    - name: Run SQL file
      run: |
        export PGPASSWORD=password
        psql -h localhost -U user -d db -a -f etc/sql/config.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_money_history.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_money_history_member.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_money_history_detail.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_money_history_detail_more.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_quote.sql
        psql -h localhost -U user -d db -a -f etc/sql/daily_stock_price_stats.sql
        psql -h localhost -U user -d db -a -f etc/sql/dividend.sql
        psql -h localhost -U user -d db -a -f etc/sql/dividend_record_detail.sql
        psql -h localhost -U user -d db -a -f etc/sql/dividend_record_detail_more.sql
        psql -h localhost -U user -d db -a -f etc/sql/estimate.sql
        psql -h localhost -U user -d db -a -f etc/sql/financial_statement.sql
        psql -h localhost -U user -d db -a -f etc/sql/index.sql
        psql -h localhost -U user -d db -a -f etc/sql/last_daily_quotes.sql
        psql -h localhost -U user -d db -a -f etc/sql/quote_history_record.sql
        psql -h localhost -U user -d db -a -f etc/sql/revenue.sql
        psql -h localhost -U user -d db -a -f etc/sql/revenue_last_date.sql
        psql -h localhost -U user -d db -a -f etc/sql/stock_exchange_market.sql
        psql -h localhost -U user -d db -a -f etc/sql/stock_industry.sql
        psql -h localhost -U user -d db -a -f etc/sql/stock_ownership_details.sql
        psql -h localhost -U user -d db -a -f etc/sql/stocks.sql
        psql -h localhost -U user -d db -a -f etc/sql/stock_word.sql
        psql -h localhost -U user -d db -a -f etc/sql/stock_index.sql
        psql -h localhost -U user -d db -a -f etc/sql/trace.sql
        psql -h localhost -U user -d db -a -f etc/sql/yield_rank.sql

    - name: Generate coverage report
      run: cargo llvm-cov --lcov --output-path lcov.info -- --test-threads=1
      env:
        RUST_BACKTRACE: 1
        DATABASE_URL: postgres://user:password@localhost:5432/db
        POSTGRESQL_HOST: localhost
        POSTGRESQL_PORT: 5432
        POSTGRESQL_USER: user
        POSTGRESQL_PASSWORD: password
        POSTGRESQL_DB: db

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-lcov
        path: lcov.info
        retention-days: 14

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: lcov.info
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

